name: CI CD - Build Push Deploy EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-test-push-deploy:
    runs-on: ubuntu-latest

    services:
      rabbitmq:
        image: rabbitmq:3-management
        ports:
          - 5672:5672
          - 15672:15672
        options: >-
          --health-cmd "rabbitmq-diagnostics -q ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Descargar código fuente
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Dar permisos al Maven Wrapper
        run: chmod +x mvnw

      - name: Ejecutar pruebas automatizadas
        env:
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          AWS_SESSION_TOKEN: test
        run: ./mvnw clean test

      - name: Iniciar sesión en Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Construir y publicar imagen Docker
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: frankcoral/plataformaeducativa:latest

      - name: Desplegar aplicación y RabbitMQ en EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo docker pull rabbitmq:3-management
            sudo docker pull frankcoral/plataformaeducativa:latest

            sudo docker volume create rabbitmq_data || true

            sudo docker rm -f rabbitmq-plataformaeducativa || true

            sudo docker run -d \
              --restart unless-stopped \
              --name rabbitmq-plataformaeducativa \
              -p 5672:5672 \
              -p 15672:15672 \
              -v rabbitmq_data:/var/lib/rabbitmq \
              rabbitmq:3-management

            sudo docker rm -f plataformaeducativa || true

            sudo docker run -d \
              --restart unless-stopped \
              --network host \
              --name plataformaeducativa \
              -e AWS_ACCESS_KEY_ID='${{ secrets.AWS_ACCESS_KEY_ID }}' \
              -e AWS_SECRET_ACCESS_KEY='${{ secrets.AWS_SECRET_ACCESS_KEY }}' \
              -e AWS_SESSION_TOKEN='${{ secrets.AWS_SESSION_TOKEN }}' \
              frankcoral/plataformaeducativa:latest

            sudo docker ps