# Base de datos temporal para pruebas
spring.datasource.url=jdbc:h2:mem:plataformaeducativa;MODE=Oracle;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Credenciales ficticias para crear el cliente S3 durante las pruebas
aws.s3.bucket-name=test-bucket
spring.cloud.aws.credentials.access-key=test
spring.cloud.aws.credentials.secret-key=test
spring.cloud.aws.credentials.session-token=test
spring.cloud.aws.region.static=us-east-1

# Evita conexiones externas innecesarias durante contextLoads
spring.rabbitmq.dynamic=false
spring.rabbitmq.listener.simple.auto-startup=false
spring.rabbitmq.listener.direct.auto-startup=false

app.rabbitmq.queue=resumen.inscripcion.queue
app.rabbitmq.exchange=resumen.inscripcion.exchange
app.rabbitmq.routing-key=resumen.inscripcion.routing